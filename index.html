<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Comisiones Avanzada - Cierre Mensual</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --border: #cbd5e1;
            --purple: #7c3aed;
            --orange: #ea580c;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Titillium Web', sans-serif; background: var(--bg); color: var(--primary); padding: 20px; line-height: 1.4; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 8px;}
        .upload-panel { background: #f8fafc; border: 2px dashed var(--accent); padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center; }
        .upload-label { background: var(--accent); color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; display: inline-block; margin-top: 10px; margin-bottom: 15px; }
        .btn-action { background: var(--orange); color: white; padding: 12px 25px; border-radius: 6px; font-weight: 700; border: none; cursor: pointer; font-size: 1.1rem; display: inline-block; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
        .header-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid var(--primary); }
        .card-mes { border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 25px; background: #fff;}
        .mes-titulo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--primary); color: white; padding: 10px; border-radius: 4px; }
        .controles-auditoria { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f8fafc; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th { text-align: left; font-size: 0.85rem; color: #475569; padding: 10px; background: #f1f5f9; border-bottom: 2px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        input, select { font-family: 'Titillium Web', sans-serif; padding: 8px; border: 1px solid var(--border); border-radius: 4px; width: 100%; }
        .factura { margin-top: 40px; border: 3px solid var(--primary); padding: 30px; border-radius: 4px; background: white; }
        .linea-detalle { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .deduccion { color: var(--danger); font-weight: 600; background: #fff1f2; padding: 10px; border-radius: 4px; margin: 5px 0; }
        .prc-deduccion { color: #854d0e; font-weight: 600; background: #fef9c3; padding: 10px; border-radius: 4px; margin: 5px 0; border: 1px solid #fef08a; }
        .total-final { font-size: 2rem; text-align: right; margin-top: 25px; color: var(--success); font-weight: 700; border-top: 2px solid var(--primary); padding-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; font-family: 'Titillium Web'; transition: 0.3s; text-align: center;}
        .btn-print { background: var(--primary); color: white; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .lista-bajas-id { background: #fef2f2; border: 1px solid #fee2e2; border-radius: 6px; padding: 15px; margin-top: 15px; }
        @media print { .no-print { display: none; } body { background: white; padding: 0; } .container { box-shadow: none; padding: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="upload-panel no-print">
        <h2>1. Liquidador de Comisiones con Regla PRC de Egresos y Churn M3</h2>
        <p>Sube la base de datos de auditoría unificada</p>
        <label for="excelFile" class="upload-label">📁 Seleccionar Matriz de Ventas Excel</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv">
        <div>
            <button type="button" class="btn-action" onclick="forzarCargaExcel()">⚙️ PROCESAR Y AUDITAR ARCHIVO</button>
        </div>
        <div id="uploadStatus" style="margin-top: 15px; font-weight: bold; font-size:1.1rem;"></div>
    </div>

    <div class="header-panel no-print">
        <div>
            <label><b>SELECCIONAR ÁMBITO DE AUDITORÍA:</b></label>
            <select id="nombreAsesor" onchange="cargarDatosAsesorFiltro()">
                <option value="">-- Seleccione un asesor o visión global --</option>
            </select>
        </div>
        <div>
            <label><b>MES ACTUAL EVALUADO (M0):</b></label>
            <input type="month" id="mesCorte" value="2026-06" onchange="inicializarCiclos()">
        </div>
    </div>

    <div id="ciclos-contenedor" class="no-print"></div>

    <div id="factura-area" class="factura" style="display:none;">
        <div style="text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px;">
            <h1 id="fac-tipo-titulo" style="margin:0;">Cierre Consolidado de Liquidación</h1>
            <p id="fac-asesor" style="margin: 5px 0; font-size: 1.2rem; font-weight: bold;"></p>
            <p id="fac-periodo" style="color: #64748b; font-weight: 600;"></p>
        </div>
        
        <h3 style="border-bottom:1px solid #eee; margin-bottom:10px;">Resumen de Ciclos Devengados</h3>
        <div id="detalles-factura"></div>
        <h3 style="border-bottom:1px solid #eee; margin-top:20px; margin-bottom:10px;">Ajustes, Penalizaciones M3 y Descuentos PRC</h3>
        <div id="fac-deducciones"></div>
        <div class="total-final" id="gran-total"></div>

        <div class="btn-group no-print">
            <button class="btn btn-print" onclick="window.print()">IMPRIMIR FACTURA / RESPALDO</button>
            <button class="btn btn-excel" onclick="exportarExcel()">DESCARGAR REPORTE AUDITADO</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        planes: {
            "300": { alquiler: 2.00, compra: 2.00 },
            "400": { alquiler: 3.50, compra: 2.50 },
            "500": { alquiler: 5.00, compra: 9.00 },
            "600": { alquiler: 5.25, compra: 9.50 },
            "1000": { alquiler: 5.50, compra: 10.00 }
        },
        ciclos: [
            { key: "m0", label: "Gross M0 (Junio)", pct: 0.45 },
            { key: "m1", label: "Gross M1 (Mayo)", pct: 0.30 },
            { key: "m2", label: "Gross M2 (Abril)", pct: 0.25 },
            { key: "m3", label: "Gross M3 (Marzo)", pct: 0.00 }
        ]
    };

    let baseDatosExcelGlobal = [];
    let penalizacionesManuales = {}; // Almacena las deducciones calculadas para cada asesor
    let asesoresActivosGlobal = [];

    function buscarPropiedad(objeto, opciones) {
        const llaves = Object.keys(objeto);
        for (let opcion of opciones) {
            let encontrada = llaves.find(l => l.toLowerCase().replace(/[\s_]/g, '') === opcion.toLowerCase().replace(/[\s_]/g, ''));
            if (encontrada) return objeto[encontrada];
        }
        return undefined;
    }

    function parsearFechaExcel(valorFecha) {
        if (!valorFecha) return null;
        if (valorFecha instanceof Date) return valorFecha;
        if (!isNaN(valorFecha)) {
            return new Date(Math.round((valorFecha - 25569) * 86400 * 1000));
        }
        let str = String(valorFecha).trim();
        let partes = str.split(/[-/]/);
        if (partes.length === 3) {
            if (partes[0].length === 4) return new Date(partes[0], partes[1] - 1, partes[2]);
            return new Date(partes[2], partes[1] - 1, partes[0]);
        }
        return new Date(str);
    }

    function evaluarFiltroFechaEspecial(fechaInst, claveCiclo) {
        if (!fechaInst || isNaN(fechaInst.getTime())) return true;
        let dia = fechaInst.getDate();
        let mes = fechaInst.getMonth() + 1;
        if (claveCiclo === "m0") return (mes === 6 && dia >= 3 && dia <= 30);
        if (claveCiclo === "m1") return ((mes === 5 && dia >= 3) || (mes === 6 && dia <= 2));
        if (claveCiclo === "m2") return ((mes === 4 && dia >= 3) || (mes === 5 && dia <= 2));
        if (claveCiclo === "m3") return ((mes === 3 && dia >= 3) || (mes === 4 && dia <= 2));
        return true;
    }

    function forzarCargaExcel() {
        const input = document.getElementById('excelFile');
        importarAuditoriaCompleta(input);
    }

    function homologarPlan(planOriginal, mesCiclo) {
        let planStr = String(planOriginal).replace(/\D/g, "");
        if (mesCiclo === "m1") {
            if (planStr === "100" || planStr === "200") return "500";
            if (planStr === "300") return "600";
        }
        if (mesCiclo === "m2" || mesCiclo === "m3") {
            if (planStr === "100" || planStr === "200") return "500";
            if (planStr === "300" || planStr === "400") return "600";
            if (planStr === "500") return "1000";
        }
        return planStr;
    }

    function importarAuditoriaCompleta(input) {
        const statusDiv = document.getElementById('uploadStatus');
        statusDiv.style.color = "orange";
        statusDiv.innerText = "⏳ Analizando BDD y procesando penalizaciones de Marzo...";
        
        const file = input.files[0];
        if (!file) {
            statusDiv.style.color = "var(--danger)";
            statusDiv.innerText = "❌ Selecciona un archivo.";
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const primerHoja = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(primerHoja);
                
                baseDatosExcelGlobal = json.map(f => {
                    let planRaw = buscarPropiedad(f, ["planVelocidad", "plan", "velocidad", "plan_velocidad"]) || "";
                    let modRaw = buscarPropiedad(f, ["propiedadEquipo", "modalidad", "propiedad", "equipo"]) || "";
                    let modPropiedad = String(modRaw).toLowerCase().trim();
                    let asesorRaw = buscarPropiedad(f, ["vendedor", "asesor", "nombre", "vendedor_nombre"]) || "";
                    let fechaRaw = buscarPropiedad(f, ["fechaInstalacion", "fecha", "fecha_inst", "instalacion"]) || "";
                    
                    return {
                        cuentaId: String(buscarPropiedad(f, ["cuentaId", "id", "cuenta", "cuenta_id"]) || ""),
                        asesor: String(asesorRaw).trim(),
                        planOriginal: String(planRaw).replace(/\D/g, ""),
                        modalidad: (modPropiedad.includes("propio") || modPropiedad.includes("compra")) ? "compra" : "alquiler",
                        fechaObjeto: parsearFechaExcel(fechaRaw),
                        m0: parseInt(buscarPropiedad(f, ["Gross_M0", "m0", "grossm0"])) || 0,
                        m1: parseInt(buscarPropiedad(f, ["Gross_M1", "m1", "grossm1"])) || 0,
                        m2: parseInt(buscarPropiedad(f, ["Gross_M2", "m2", "grossm2"])) || 0,
                        m3: parseInt(buscarPropiedad(f, ["Gross_M3", "m3", "grossm3"])) || 0,
                        estatusEstricto: buscarPropiedad(f, ["EstatusEstricto", "estatus_estricto", "estricto"]) !== undefined ? parseInt(buscarPropiedad(f, ["EstatusEstricto", "estatus_estricto", "estricto"])) : 1,
                        estatus30d: buscarPropiedad(f, ["Estatus30d", "estatus30", "on30", "estatus_30d"]) !== undefined ? parseInt(buscarPropiedad(f, ["Estatus30d", "estatus30", "on30", "estatus_30d"])) : 1
                    };
                }).filter(f => f.asesor !== "" && f.asesor !== "undefined");

                asesoresActivosGlobal = [...new Set(baseDatosExcelGlobal.map(f => f.asesor))].sort();
                const selectAsesor = document.getElementById('nombreAsesor');
                selectAsesor.innerHTML = '<option value="">-- Seleccione un asesor o visión global --</option>';
                selectAsesor.innerHTML += '<option value="GLOBAL_ALL">--- VER TODA LA FACTURACIÓN COMPLETA (GLOBAL) ---</option>';
                asesoresActivosGlobal.forEach(a => {
                    let opt = document.createElement('option'); opt.value = a; opt.innerText = a.toUpperCase(); selectAsesor.appendChild(opt);
                });

                statusDiv.style.color = "var(--success)";
                statusDiv.innerText = `✅ ¡BDD Sincronizada! Regla de deducción PRC para egresos implementada correctamente.`;
                inicializarCiclos();
            } catch (err) {
                statusDiv.style.color = "var(--danger)";
                statusDiv.innerText = "❌ Error: " + err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function cargarDatosAsesorFiltro() {
        const seleccion = document.getElementById('nombreAsesor').value;
        if(!seleccion) { document.getElementById('factura-area').style.display = "none"; return; }
        if(seleccion === "GLOBAL_ALL") {
            document.querySelectorAll('.card-mes').forEach(card => card.style.display = "none");
            procesarTodo();
            return;
        } else {
            document.querySelectorAll('.card-mes').forEach(card => card.style.display = "block");
        }

        const registrosAsesor = baseDatosExcelGlobal.filter(f => f.asesor.toUpperCase() === seleccion.toUpperCase());
        const tieneM0Active = registrosAsesor.some(r => r.m0 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m0"));
        const tieneM1 = registrosAsesor.some(r => r.m1 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m1"));
        const tieneM2 = registrosAsesor.some(r => r.m2 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m2"));
        const esAsesorNuevo = !tieneM1 && !tieneM2;

        document.querySelectorAll('.card-mes').forEach((card, index) => {
            const cicloCfg = CONFIG.ciclos[index];
            if (esAsesorNuevo && cicloCfg.key !== "m0") {
                card.style.display = "none";
                return;
            }

            // Si es antiguo pero no tiene ventas en M0 (egreso/inactivo), no se liquidan M1 ni M2
            if ((cicloCfg.key === "m1" || cicloCfg.key === "m2") && !tieneM0Active) {
                card.style.display = "none";
                return;
            }

            const ventasFiltradas = registrosAsesor.filter(r => r[cicloCfg.key] === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, cicloCfg.key));
            let totalOrigen = ventasFiltradas.length;
            let totalActivos = 0;

            if(cicloCfg.key === "m0") totalActivos = totalOrigen;
            if(cicloCfg.key === "m1") totalActivos = ventasFiltradas.filter(r => r.estatusEstricto === 1).length;
            if(cicloCfg.key === "m2") totalActivos = ventasFiltradas.filter(r => r.estatus30d === 1).length;

            card.querySelector('.v-ini').value = totalOrigen;
            card.querySelector('.v-act').value = totalActivos;
            
            let tituloSpan = card.querySelector('.mes-titulo span');
            tituloSpan.innerHTML = `CONCILIACIÓN: ${cicloCfg.label.toUpperCase()}`;
            if(esAsesorNuevo && cicloCfg.key === "m0") tituloSpan.innerHTML += " 🔥 [NUEVO - RESTRICCIÓN 100% M0]";

            let resumen = {};
            ventasFiltradas.forEach(v => {
                if(cicloCfg.key === "m1" && v.estatusEstricto !== 1) return;
                if(cicloCfg.key === "m2" && v.estatus30d !== 1) return;
                let planHomologado = homologarPlan(v.planOriginal, cicloCfg.key);
                let k = `${planHomologado}_${v.modalidad}`;
                if(!resumen[k]) resumen[k] = { plan: planHomologado, mod: v.modalidad, cant: 0 };
                resumen[k].cant++;
            });

            const tbody = card.querySelector('tbody'); tbody.innerHTML = "";
            Object.values(resumen).forEach(d => {
                if(CONFIG.planes[d.plan]) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><input type="text" class="p-nombre" value="${d.plan}" oninput="procesarTodo()"></td>
                        <td><select class="p-mod" onchange="procesarTodo()">
                            <option value="alquiler" ${d.mod === 'alquiler' ? 'selected' : ''}>Alquiler</option>
                            <option value="compra" ${d.mod === 'compra' ? 'selected' : ''}>Compra</option>
                        </select></td>
                        <td><input type="number" class="p-cant" value="${d.cant}" oninput="procesarTodo()"></td>
                        <td class="p-sub">$0.00</td>
                        <td><button onclick="this.parentElement.parentElement.remove(); procesarTodo()" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td>`;
                    tbody.appendChild(tr);
                }
            });

            // Remover panel anterior de bajas si existía para actualizar
            let divBajas = card.querySelector('.lista-bajas-id');
            if(divBajas) divBajas.remove();

            // Lógica Automatizada de Deducciones M3 (Marzo)
            if(cicloCfg.key === "m3" && !esAsesorNuevo) {
                let ventasMarzo = registrosAsesor.filter(r => r.m3 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m3"));
                let totalVentasMarzo = ventasMarzo.length;
                let clientesBajas = ventasMarzo.filter(r => r.estatus30d === 0);
                let totalBajas = clientesBajas.length;
                let pctChurnReal = totalVentasMarzo > 0 ? (totalBajas / totalVentasMarzo) * 100 : 0;

                let cuentasADeducir = 0;
                let penalizacionTotal = 0;

                if (pctChurnReal > 10) {
                    let maxBajasPermitidas = Math.floor(totalVentasMarzo * 0.10);
                    cuentasADeducir = totalBajas - maxBajasPermitidas;
                    penalizacionTotal = cuentasADeducir * 10;
                }

                // Guardar cálculo para ser restado del total de facturación
                penalizacionesManuales[seleccion.toUpperCase()] = {
                    ventas: totalVentasMarzo,
                    bajas: totalBajas,
                    churn: pctChurnReal,
                    deducir: cuentasADeducir,
                    monto: penalizacionTotal,
                    disponibleM0: tieneM0Active
                };

                divBajas = document.createElement('div');
                divBajas.className = 'lista-bajas-id';
                if (pctChurnReal > 10) {
                    divBajas.innerHTML = `
                        <p style="margin:0; color:var(--danger); font-weight:700;">
                            ⚠️ PENALIZACIÓN M3 DETECTADA (Superó 10% Churn):<br>
                            Ventas Marzo: ${totalVentasMarzo} | Clientes OFF: ${totalBajas} | % Churn: <b>${pctChurnReal.toFixed(1)}%</b><br>
                            Excedente de Cuentas: <span style="font-size:1.1rem; color:red;">-${cuentasADeducir}</span> | 
                            Monto a deducir (fijo $10 c/u): <span style="font-size:1.2rem; color:red;">-$${penalizacionTotal.toFixed(2)}</span><br>
                            ${!tieneM0Active ? '<b style="color:#b45309;">⚠️ ATENCIÓN: Asesor no disponible en Junio (M0). Esta deducción se transferirá a la cuenta de PRC.</b>' : ''}
                        </p>`;
                } else {
                    divBajas.innerHTML = `
                        <p style="margin:0; color:var(--success); font-weight:700;">
                            ✅ Churn M3 Controlado (${pctChurnReal.toFixed(1)}% de un límite de 10%):<br>
                            Ventas Marzo: ${totalVentasMarzo} | Clientes OFF: ${totalBajas} | No aplica deducción financiera.
                        </p>`;
                }
                card.appendChild(divBajas);
            }
        });
        procesarTodo();
    }

    function inicializarCiclos() {
        const contenedor = document.getElementById('ciclos-contenedor');
        contenedor.innerHTML = "";
        CONFIG.ciclos.forEach(ciclo => {
            const card = document.createElement('div');
            card.className = 'card-mes'; card.dataset.key = ciclo.key; card.dataset.pct = ciclo.pct;
            card.innerHTML = `
                <div class="mes-titulo">
                    <span>CONCILIACIÓN: ${ciclo.label.toUpperCase()}</span>
                    ${ciclo.key === 'm0' ? `<div style='display:flex; gap:15px; font-size:0.85rem;'><label><input type='checkbox' class='m-ind' onchange='procesarTodo()'> Meta Individual</label><label><input type='checkbox' class='m-gru' onchange='procesarTodo()'> Meta Grupal</label></div>` : ''}
                </div>
                <div class="controles-auditoria">
                    <div><label>Ventas Iniciales Gross:</label><input type="number" class="v-ini" value="0" readonly style="background:#f1f5f9;"></div>
                    <div><label>Clientes Auditados Activos:</label><input type="number" class="v-act" value="0" readonly style="background:#f1f5f9;"></div>
                </div>
                <table class="tabla-ventas">
                    <thead><tr><th>Plan Mbps</th><th>Modalidad</th><th>Ventas Consolidadas</th><th>Subtotal Neto</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>`;
            contenedor.appendChild(card);
        });
    }

    function procesarTodo() {
        const seleccion = document.getElementById('nombreAsesor').value;
        if(!seleccion) { document.getElementById('factura-area').style.display = "none"; return; }
        document.getElementById('factura-area').style.display = "block";
        
        let totalLiquidacionGeneral = 0;

        if (seleccion === "GLOBAL_ALL") {
            document.getElementById('fac-tipo-titulo').innerText = "Cierre Global de Liquidación Institucional";
            document.getElementById('fac-asesor').innerText = "TODOS LOS ASESORES CONSOLIDADOS";
            document.getElementById('fac-periodo').innerText = "NÓMINA INTEGRAL CON REGLAS DE EGRESO, PRC Y CHURN M3";
            let globalM0 = 0, globalM1 = 0, globalM2 = 0;
            let globalDeduccionM3Asesores = 0; // Descontados directo del asesor activo
            let globalDeduccionM3PRC = 0;       // Descontados de PRC (por asesores egresos/inactivos)

            asesoresActivosGlobal.forEach(as => {
                const registros = baseDatosExcelGlobal.filter(f => f.asesor.toUpperCase() === as.toUpperCase());
                const tieneM0Active = registros.some(r => r.m0 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m0"));
                const tieneM1 = registros.some(r => r.m1 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m1"));
                const tieneM2 = registros.some(r => r.m2 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m2"));
                const esNuevo = !tieneM1 && !tieneM2;

                registros.forEach(r => {
                    let pHomologado = homologarPlan(r.planOriginal, r.m0===1?'m0':(r.m1===1?'m1':'m2'));
                    let val = (CONFIG.planes[pHomologado]) ? CONFIG.planes[pHomologado][r.modalidad] : 0;
                    
                    if(r.m0 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m0")) {
                        globalM0 += Math.round(val * (esNuevo ? 1.0 : 0.45));
                    }
                    if(!esNuevo && tieneM0Active) {
                        if(r.m1 === 1 && r.estatusEstricto === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m1")) globalM1 += Math.round(val * 0.30);
                        if(r.m2 === 1 && r.estatus30d === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m2")) globalM2 += Math.round(val * 0.25);
                    }
                });

                // Calcular penalización M3 global para este asesor
                let ventasMarzo = registros.filter(r => r.m3 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m3"));
                let totalVentasMarzo = ventasMarzo.length;
                let clientesBajas = ventasMarzo.filter(r => r.estatus30d === 0);
                let totalBajas = clientesBajas.length;
                let pctChurnReal = totalVentasMarzo > 0 ? (totalBajas / totalVentasMarzo) * 100 : 0;

                if (pctChurnReal > 10 && !esNuevo) {
                    let maxBajasPermitidas = Math.floor(totalVentasMarzo * 0.10);
                    let cuentasADeducir = totalBajas - maxBajasPermitidas;
                    let montoDeduccion = cuentasADeducir * 10;

                    if (tieneM0Active) {
                        globalDeduccionM3Asesores += montoDeduccion;
                    } else {
                        globalDeduccionM3PRC += montoDeduccion;
                    }
                }
            });

            // El total de liquidación de asesores activos descuenta solo las penalizaciones de asesores activos.
            totalLiquidacionGeneral = globalM0 + globalM1 + globalM2 - globalDeduccionM3Asesores;

            document.getElementById('detalles-factura').innerHTML = `
                <div class="linea-detalle"><span><b>TOTAL LIQUIDACIÓN M0 (45% Antiguos / 100% Nuevos)</b></span><span>$${globalM0.toFixed(2)}</span></div>
                <div class="linea-detalle"><span><b>TOTAL LIQUIDACIÓN M1 (30% Mayo - Filtrado de Nómina Activa)</b></span><span>$${globalM1.toFixed(2)}</span></div>
                <div class="linea-detalle"><span><b>TOTAL LIQUIDACIÓN M2 (25% Abril - Filtrado de Nómina Activa)</b></span><span>$${globalM2.toFixed(2)}</span></div>`;
            
            let htmlDeduccionesGlobal = "";
            if(globalDeduccionM3Asesores > 0) {
                htmlDeduccionesGlobal += `<div class="linea-detalle deduccion"><span>❌ DEDUCCIÓN CHURN M3 (Asesores Activos)</span><span>-$${globalDeduccionM3Asesores.toFixed(2)}</span></div>`;
            }
            if(globalDeduccionM3PRC > 0) {
                htmlDeduccionesGlobal += `<div class="linea-detalle prc-deduccion"><span>💼 DEDUCCIÓN COBRADA A PRC (Asesores Inactivos/Egresos con Churn M3)</span><span>-$${globalDeduccionM3PRC.toFixed(2)}</span></div>`;
            }

            document.getElementById('fac-deducciones').innerHTML = htmlDeduccionesGlobal || '<div class="linea-detalle" style="color:var(--success)"><b>Sin penalizaciones de Churn M3 aplicables.</b></div>';
        } else {
            document.getElementById('fac-tipo-titulo').innerText = "Cierre Consolidado de Liquidación";
            document.getElementById('fac-asesor').innerText = seleccion.toUpperCase();
            document.getElementById('fac-periodo').innerText = `PERIODO AUDITADO CRONOLÓGICO`;
            
            let htmlVentas = "";
            const registrosAsesor = baseDatosExcelGlobal.filter(f => f.asesor.toUpperCase() === seleccion.toUpperCase());
            const tieneM0Active = registrosAsesor.some(r => r.m0 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m0"));
            const tieneM1 = registrosAsesor.some(r => r.m1 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m1"));
            const tieneM2 = registrosAsesor.some(r => r.m2 === 1 && evaluarFiltroFechaEspecial(r.fechaObjeto, "m2"));
            const esAsesorNuevo = !tieneM1 && !tieneM2;
            
            document.querySelectorAll('.card-mes').forEach(card => {
                const key = card.dataset.key;
                if(esAsesorNuevo && key !== "m0") return;
                if((key === "m1" || key === "m2") && !tieneM0Active) return;

                let pctCiclo = parseFloat(card.dataset.pct);
                if(esAsesorNuevo && key === "m0") pctCiclo = 1.0;
                let bolsaBaseCiclo = 0;

                card.querySelectorAll('tbody tr').forEach(fila => {
                    const plan = fila.querySelector('.p-nombre').value;
                    const mod = fila.querySelector('.p-mod').value;
                    const cant = parseInt(fila.querySelector('.p-cant').value) || 0;
                    if(CONFIG.planes[plan]) {
                        const sub = CONFIG.planes[plan][mod] * cant;
                        fila.querySelector('.p-sub').innerText = `$${sub.toFixed(2)}`;
                        bolsaBaseCiclo += sub;
                    }
                });

                let comisionNetoCiclo = Math.round(bolsaBaseCiclo * pctCiclo);
                totalLiquidacionGeneral += comisionNetoCiclo;
                
                if(pctCiclo > 0 || bolsaBaseCiclo > 0) { 
                    htmlVentas += `<div class="linea-detalle"><span><b>${key.toUpperCase()}</b> (Comisión Base al ${pctCiclo*100}%)</span><span>$${comisionNetoCiclo.toFixed(2)}</span></div>`; 
                }

                if(key === "m0") {
                    const cardM0 = document.querySelector('.card-mes[data-key="m0"]');
                    if(cardM0 && cardM0.querySelector('.m-ind').checked && cardM0.querySelector('.m-gru').checked) {
                        const montoAcelerador = Math.round(bolsaBaseCiclo * 0.65);
                        totalLiquidacionGeneral += montoAcelerador;
                        htmlVentas += `<div class="linea-detalle" style="color:var(--success); font-weight:700;"><span>🚀 ACELERADOR JUNIO M0 (+65%)</span><span>+$${montoAcelerador.toFixed(2)}</span></div>`;
                    }
                }
            });

            // Aplicar deducción de M3 si existe y corresponde
            let htmlDeducciones = "";
            const penalizacionInfo = penalizacionesManuales[seleccion.toUpperCase()];
            if(penalizacionInfo && penalizacionInfo.monto > 0 && !esAsesorNuevo) {
                if (tieneM0Active) {
                    totalLiquidacionGeneral -= penalizacionInfo.monto;
                    htmlDeducciones = `<div class="linea-detalle deduccion"><span>❌ PENALIZACIÓN EXCESO CHURN M3 (${penalizacionInfo.deducir} cuentas a $10.00 c/u)</span><span>-$${penalizacionInfo.monto.toFixed(2)}</span></div>`;
                } else {
                    htmlDeducciones = `<div class="linea-detalle prc-deduccion"><span>💼 DEDUCCIÓN APLICADA A CUENTA PRC (Asesor Inactivo/Egreso - Churn M3)</span><span>-$${penalizacionInfo.monto.toFixed(2)}</span></div>`;
                }
            }

            document.getElementById('detalles-factura').innerHTML = htmlVentas;
            document.getElementById('fac-deducciones').innerHTML = htmlDeducciones || '<div class="linea-detalle" style="color:var(--success)"><b>Sin penalizaciones de Churn M3 o exento por Asesor Nuevo.</b></div>';
        }
        
        if(totalLiquidacionGeneral < 0) totalLiquidacionGeneral = 0;
        document.getElementById('gran-total').innerText = `TOTAL FACTURA NETO: $${totalLiquidacionGeneral.toFixed(2)}`;
    }

    function exportarExcel() {
        alert("Construyendo reporte consolidado de auditoría...");
    }
</script>

</html>
