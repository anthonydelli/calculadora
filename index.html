<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Comisiones - Exportación Excel</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --border: #cbd5e1;
        }

        body { 
            font-family: 'Titillium Web', sans-serif; 
            background: var(--bg); 
            color: var(--primary); 
            padding: 20px; 
            line-height: 1.4;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        
        .header-panel { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
            padding-bottom: 20px; 
            border-bottom: 2px solid var(--primary); 
        }
        
        .card-mes { 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 25px; 
            background: #fff;
        }

        .mes-titulo { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 4px;
        }

        .controles-auditoria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: #f8fafc; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 15px; 
            border: 1px solid #e2e8f0;
        }
        
        .pagos-realizados { display: flex; gap: 8px; align-items: center; margin-top: 5px; }
        .pagos-realizados label { 
            background: #fff; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.8rem; cursor: pointer; 
        }

        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th { text-align: left; font-size: 0.8rem; color: #475569; padding: 8px; background: #f1f5f9; border-bottom: 2px solid var(--border); }
        td { padding: 8px; border-bottom: 1px solid #f1f5f9; }

        input, select { font-family: 'Titillium Web', sans-serif; padding: 8px; border: 1px solid var(--border); border-radius: 4px; width: 100%; }
        
        .factura { margin-top: 40px; border: 3px solid var(--primary); padding: 30px; border-radius: 4px; background: white; }
        .linea-detalle { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .deduccion { color: var(--danger); font-weight: 600; background: #fff1f2; padding: 10px; border-radius: 4px; margin: 5px 0; }
        .total-final { font-size: 2rem; text-align: right; margin-top: 25px; color: var(--success); font-weight: 700; border-top: 2px solid var(--primary); padding-top: 10px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: 700; font-family: 'Titillium Web'; transition: 0.3s; }
        .btn-print { background: var(--primary); color: white; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-panel no-print">
        <div>
            <label><b>NOMBRE DEL ASESOR:</b></label>
            <input type="text" id="nombreAsesor" placeholder="Ingrese nombre..." oninput="procesarTodo()">
        </div>
        <div>
            <label><b>MES DE LIQUIDACIÓN:</b></label>
            <input type="month" id="mesCorte" onchange="inicializarCiclos()">
        </div>
    </div>

    <div id="ciclos-contenedor" class="no-print"></div>

    <div id="factura-area" class="factura" style="display:none;">
        <div style="text-align: center; border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px;">
            <h1 style="margin:0;">Liquidación de Comisiones</h1>
            <p id="fac-asesor" style="margin: 5px 0; font-size: 1.2rem;"></p>
            <p id="fac-periodo" style="color: #64748b; font-weight: 600;"></p>
        </div>
        
        <div id="detalles-factura"></div>
        <div id="fac-deducciones"></div>
        <div class="total-final" id="gran-total"></div>
        
        <div class="btn-group no-print">
            <button class="btn btn-print" onclick="window.print()">IMPRIMIR PDF</button>
            <button class="btn btn-excel" onclick="exportarExcel()">DESCARGAR EXCEL</button>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        planes: {
            "300": { alquiler: 2.00, compra: 2.00 },
            "400": { alquiler: 3.50, compra: 2.50 },
            "500": { alquiler: 5.00, compra: 9.00 },
            "600": { alquiler: 5.25, compra: 9.50 },
            "1000": { alquiler: 5.50, compra: 10.00 }
        },
        ciclos: [
            { label: "Mes Anterior", pct: 0.45, desfase: -1 },
            { label: "Hace 2 Meses", pct: 0.30, desfase: -2 },
            { label: "Hace 3 Meses", pct: 0.25, desfase: -3 }
        ]
    };

    let datosParaExcel = [];

    function inicializarCiclos() {
        const fechaVal = document.getElementById('mesCorte').value;
        if(!fechaVal) return;
        const fechaBase = new Date(fechaVal + "-01T12:00:00");
        const contenedor = document.getElementById('ciclos-contenedor');
        contenedor.innerHTML = "";

        CONFIG.ciclos.forEach(ciclo => {
            let f = new Date(fechaBase);
            f.setMonth(f.getMonth() + ciclo.desfase);
            let nombreMes = f.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
            const card = document.createElement('div');
            card.className = 'card-mes';
            card.dataset.pct = ciclo.pct;
            card.dataset.nombreMes = nombreMes;
            card.innerHTML = `
                <div class="mes-titulo">
                    <span style="font-weight:700;">${nombreMes.toUpperCase()}</span>
                    <div style="display:flex; gap:15px; font-size:0.85rem;">
                        <label><input type="checkbox" class="m-ind" onchange="procesarTodo()"> Meta Individual</label>
                        <label><input type="checkbox" class="m-gru" onchange="procesarTodo()"> Meta Grupal</label>
                    </div>
                </div>
                <div class="controles-auditoria">
                    <div><label>Ventas Origen:</label><input type="number" class="v-ini" value="0" oninput="procesarTodo()"></div>
                    <div><label>Clientes Activos:</label><input type="number" class="v-act" value="0" oninput="procesarTodo()"></div>
                    <div><label>Pagos ya efectuados:</label>
                        <div class="pagos-realizados">
                            <label><input type="checkbox" class="p-prev" value="0.45" onchange="procesarTodo()"> 45%</label>
                            <label><input type="checkbox" class="p-prev" value="0.30" onchange="procesarTodo()"> 30%</label>
                        </div>
                    </div>
                </div>
                <table class="tabla-ventas">
                    <thead><tr><th>Plan Mbps</th><th>Modalidad</th><th>Ventas</th><th>Subtotal</th><th></th></tr></thead>
                    <tbody></tbody>
                </table>
                <button onclick="agregarFila(this)" style="padding:5px 15px; cursor:pointer;">+ Añadir Plan</button>`;
            contenedor.appendChild(card);
            agregarFila(card.querySelector('button'));
        });
        procesarTodo();
    }

    function agregarFila(btn) {
        const tbody = btn.closest('.card-mes').querySelector('tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="p-nombre" list="listaPlanes" oninput="procesarTodo()"></td>
            <td><select class="p-mod" onchange="procesarTodo()"><option value="alquiler">Alquiler</option><option value="compra">Compra</option></select></td>
            <td><input type="number" class="p-cant" value="0" oninput="procesarTodo()"></td>
            <td class="p-sub">$0.00</td>
            <td><button onclick="this.parentElement.parentElement.remove(); procesarTodo()" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td>`;
        tbody.appendChild(tr);
    }

    function procesarTodo() {
        const asesor = document.getElementById('nombreAsesor').value;
        if(!asesor) return;
        document.getElementById('factura-area').style.display = "block";
        document.getElementById('fac-asesor').innerText = asesor.toUpperCase();
        document.getElementById('fac-periodo').innerText = `PERIODO: ${document.getElementById('mesCorte').value}`;

        let totalLiquidacion = 0;
        let htmlVentas = "";
        let htmlDeducciones = "";
        datosParaExcel = []; // Limpiar datos previos

        document.querySelectorAll('.card-mes').forEach(card => {
            const pctCiclo = parseFloat(card.dataset.pct);
            const ini = parseFloat(card.querySelector('.v-ini').value) || 0;
            const act = parseFloat(card.querySelector('.v-act').value) || 0;
            const metaCheck = card.querySelector('.m-ind').checked && card.querySelector('.m-gru').checked;
            const acelerador = metaCheck ? 1.65 : 1.0;
            const mesNombre = card.dataset.nombreMes;

            let bolsaBaseTotal = 0;
            card.querySelectorAll('tbody tr').forEach(fila => {
                const plan = fila.querySelector('.p-nombre').value;
                const mod = fila.querySelector('.p-mod').value;
                const cant = parseInt(fila.querySelector('.p-cant').value) || 0;
                if(CONFIG.planes[plan]) {
                    const sub = CONFIG.planes[plan][mod] * cant;
                    fila.querySelector('.p-sub').innerText = `$${sub.toFixed(2)}`;
                    bolsaBaseTotal += sub;
                    // Guardar para excel
                    datosParaExcel.push({ Mes: mesNombre, Plan: plan, Modalidad: mod, Cantidad: cant, Subtotal: sub });
                }
            });

            let pagoNetoMes = (bolsaBaseTotal * pctCiclo) * acelerador;
            if(ini > 0) pagoNetoMes = (pagoNetoMes / ini) * act;
            totalLiquidacion += pagoNetoMes;

            htmlVentas += `<div class="linea-detalle"><span><b>${mesNombre}</b> (Ciclo ${pctCiclo*100}%)</span><span>$${pagoNetoMes.toFixed(2)}</span></div>`;

            const tasaChurn = ini > 0 ? ((ini - act) / ini) : 0;
            if(tasaChurn > 0.10) {
                const excedenteChurn = tasaChurn - 0.10;
                let pctYaPagado = 0;
                card.querySelectorAll('.p-prev:checked').forEach(c => pctYaPagado += parseFloat(c.value));
                if(pctYaPagado > 0) {
                    const montoDeducir = (bolsaBaseTotal * acelerador * pctYaPagado) * excedenteChurn;
                    totalLiquidacion -= montoDeducir;
                    htmlDeducciones += `<div class="linea-detalle deduccion"><span>DEDUCCIÓN EXCEDENTE CHURN (${mesNombre})</span><span>-$${montoDeducir.toFixed(2)}</span></div>`;
                }
            }
        });
        document.getElementById('detalles-factura').innerHTML = htmlVentas;
        document.getElementById('fac-deducciones').innerHTML = htmlDeducciones;
        document.getElementById('gran-total').innerText = `TOTAL NETO: $${totalLiquidacion.toFixed(2)}`;
    }

    function exportarExcel() {
        const asesor = document.getElementById('nombreAsesor').value || "Asesor";
        const ws = XLSX.utils.json_to_sheet(datosParaExcel);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Liquidación");
        XLSX.writeFile(wb, `Liquidacion_${asesor}_${document.getElementById('mesCorte').value}.xlsx`);
    }
</script>

<datalist id="listaPlanes">
    <option value="300"><option value="400"><option value="500"><option value="600"><option value="1000">
</datalist>
</body>
</html>
